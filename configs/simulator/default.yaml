# configs/simulator/default.yaml
# @package simulator

seed_range: [0, 9999]

# When set, SimulatorAdapter loads this exact world instead of creating a fresh
# one. Use for probe runs or evaluation replay where training requests were
# generated from a specific world snapshot.
world_id: null

# WorldPool settings — controls how simulator instances are created for training.
# Amortises world-generation cost across parallel environments.
#
# unique_per_episode: false (default) — use WorldPool; generate pool_size worlds
#   at trainer startup and rotate them across episodes.  Much faster for large runs.
# unique_per_episode: true — generate a fresh world on every CompressionEnv.reset().
#   Use for debugging or when world generation is very fast.
#
# Memory: pool_size=20 worlds × ~200 KB/world ≈ 4 MB (negligible on T4).
pool_size: 20
unique_per_episode: false

# World generation parameters — forwarded verbatim to WorldGenerator as world_config.
# Keys must match WorldGenerator.DEFAULT_CONFIG in my-travel-world/travel_world/generation/world_generator.py.
world_params:
  num_regions: 1
  num_cities_per_region: 3        # 3 cities supports multi-city trip templates
  num_districts_per_city: 5
  num_hotels_per_district: 3
  num_attractions_per_district: 4
  num_restaurants_per_district: 5
  num_transport_hubs_per_city: 2
  date_range_days: 90
  num_events_per_city: 60
  num_flights_per_route: 10
