# configs/training/ppo_default.yaml
# @package training
num_timesteps: 500000
n_envs: 4
seed: 42
resume_from: null
checkpoint_every_n_steps: 10000
device: auto                  # 'auto' | 'cuda' | 'cpu'
episode_save_freq: 0          # 0 = never save full EpisodeLog during training
run_name: null                # override per-run: project.run_name=my_exp
ppo:
  learning_rate: 3.0e-5
  n_steps: 2048
  batch_size: 64
  n_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 1.0
  lr_schedule: constant       # 'constant' | 'linear' | 'cosine'
