# configs/training/ppo_colab.yaml
# Colab-friendly config: smaller batch, fewer parallel envs, GPU auto-detect.
# @package training
num_timesteps: 50000
n_envs: 2
seed: 42
resume_from: null
checkpoint_every_n_steps: 5000
device: auto                  # T4 GPU detected automatically in Colab
episode_save_freq: 0          # storage-limited on Colab — use JSONL only
run_name: null                # set at CLI: project.run_name=identity_baseline
ppo:
  learning_rate: 3.0e-5
  n_steps: 512
  batch_size: 32
  n_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 1.0
  lr_schedule: constant       # switch to 'linear' for longer runs (>100k steps)
