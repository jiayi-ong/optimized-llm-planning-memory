# configs/training/ppo_debug.yaml
# ================================
# Minimal smoke-test config — completes a full PPO update cycle in ~1-2 minutes.
#
# Math:
#   n_envs=1, n_steps=4  → rollout buffer fills after 4 env.step() calls
#   num_timesteps=8      → 2 rollout collections → triggers 1 PPO update
#   steps_per_compression=1, max_agent_steps=2 → each episode = 2 LLM calls total
#   Total LLM calls ≈ 16 (cheap, fast)
#
# Usage:
#   python scripts/run_training.py training=ppo_debug agent=react_debug compressor=identity
#
# @package training

num_timesteps: 8
n_envs: 1
checkpoint_every_n_steps: 8
resume_from: null

ppo:
  learning_rate: 3.0e-5
  n_steps: 4
  batch_size: 4
  n_epochs: 1
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 1.0

env:
  max_obs_tokens: 512
  max_action_tokens: 128
  steps_per_compression: 1
  max_agent_steps: 2
  vocab_size: 32768
