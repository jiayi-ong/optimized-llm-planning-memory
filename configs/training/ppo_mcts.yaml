# configs/training/ppo_mcts.yaml
# ================================
# Training config for MCTS-augmented PPO runs.
#
# Uses lighter MCTS settings (num_simulations=20, branching_factor=2) to keep
# wall-clock time per episode reasonable during RL training, while still
# benefiting from multi-hypothesis context compression.
#
# Fewer parallel envs (n_envs=2) because each MCTS search makes multiple LLM
# API calls, making the per-env overhead much higher than standard training.
#
# Usage:
#   python scripts/run_training.py agent=react_mcts compressor=llm_mcts training=ppo_mcts
#
# @package training

num_timesteps: 200000
n_envs: 2
checkpoint_every_n_steps: 5000
resume_from: null

ppo:
  learning_rate: 3.0e-5
  n_steps: 512
  batch_size: 32
  n_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 1.0

env:
  max_obs_tokens: 2048
  max_action_tokens: 512
  steps_per_compression: 5

# MCTS overrides for training (lighter than evaluation defaults)
# These override the mcts section in agent/react_mcts.yaml when used together.
# To apply: use Hydra override syntax:
#   agent.mcts.num_simulations=20 agent.mcts.branching_factor=2
