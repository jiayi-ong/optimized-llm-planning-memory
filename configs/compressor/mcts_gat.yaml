# configs/compressor/mcts_gat.yaml
# @package compressor
#
# Design 2: MCTSGraphAttentionDistiller
# Path-set attention over MCTS search tree for AgentMode.MCTS_COMPRESSOR.
#
# Training curriculum:
#   Phase 1 (supervised, ~1 hr Colab): imitation learning on LLMMCTSCompressor outputs
#   Phase 2 (PPO, ~4 hr Colab): RL fine-tuning with num_simulations=10
#
# Colab T4 memory budget: ~437 MB (well within 16 GB limit).
#
# NOTE: use_lora applies LoRA to the DECODER only (encoder is always frozen).
type: mcts_gat
model_name_or_path: google/flan-t5-small
max_input_tokens: 256    # max tokens per path's trajectory text
max_output_tokens: 512
device: auto
use_lora: true
lora:
  r: 8
  alpha: 16
  dropout: 0.0           # 0.0 for PPO stability: eval/train log_prob mismatch with dropout≠0
                         # causes approx_kl spike even before gradient updates
  target_modules: [q, v]
freeze_base_layers: false
top_k_paths: 3           # number of paths selected by Gumbel top-K
generation:
  num_beams: 4
  early_stopping: true
  no_repeat_ngram_size: 3
  max_new_tokens: 512
