# configs/agent/sweep_E_react.yaml
# Prompt sweep variant E — Step-Budget Phased Planning (ReAct).
# Philosophy: hard step-count deadlines per phase; if deadline missed, skip to next phase immediately.
# @package agent
mode: raw
llm_model_id: openai/gpt-4o-mini
max_steps: 25
max_retries_per_action: 3
compress_every_n_steps: 9999
compress_on_token_threshold: 999999
temperature: 0.0
system_prompt_version: sweep_E
