# configs/agent/react_debug.yaml
# ================================
# Minimal agent config for smoke-test runs alongside training=ppo_debug.
# max_steps must match env.max_agent_steps in ppo_debug.yaml.
#
# @package agent

mode: compressor
llm_model_id: openai/gpt-4o-mini
max_steps: 2
max_retries_per_action: 1
compress_every_n_steps: 1
compress_on_token_threshold: 9999
temperature: 0.0
system_prompt_version: v1
