# configs/agent/sweep_C_react.yaml
# Prompt sweep variant C — Commit-Every-Step (ReAct).
# Philosophy: iron rule that every search tool call must be immediately followed by a booking.
# @package agent
mode: raw
llm_model_id: openai/gpt-4o-mini
max_steps: 30
max_retries_per_action: 3
compress_every_n_steps: 9999
compress_on_token_threshold: 999999
temperature: 0.0
system_prompt_version: sweep_C
