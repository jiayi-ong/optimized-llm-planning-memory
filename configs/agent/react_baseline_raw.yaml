# configs/agent/react_baseline_raw.yaml
# Baseline condition 1: raw trajectory (no compression).
# @package agent
agent:
  mode: raw
  llm_model_id: openai/gpt-4o-mini
  max_steps: 30
  max_retries_per_action: 3
  compress_every_n_steps: 9999   # effectively disabled
  compress_on_token_threshold: 999999
  temperature: 0.0
  system_prompt_version: v1
