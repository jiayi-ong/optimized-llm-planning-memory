# configs/agent/sweep_F_stateless.yaml
# Prompt sweep variant F — Non-ReAct Stateless (Assess-then-Act).
# Philosophy: agent sees only current itinerary, no history; commits to booking on each call.
# @package agent
mode: stateless
llm_model_id: openai/gpt-4o-mini
max_steps: 25
max_retries_per_action: 3
compress_every_n_steps: 9999
compress_on_token_threshold: 999999
temperature: 0.0
system_prompt_version: sweep_F
