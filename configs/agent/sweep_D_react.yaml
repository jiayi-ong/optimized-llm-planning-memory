# configs/agent/sweep_D_react.yaml
# Prompt sweep variant D — Minimal Viable Itinerary First (ReAct).
# Philosophy: prioritize reaching a booked baseline (1 flight + 1 hotel + 1 activity) within 8 steps before enhancing.
# @package agent
mode: raw
llm_model_id: openai/gpt-4o-mini
max_steps: 20
max_retries_per_action: 3
compress_every_n_steps: 9999
compress_on_token_threshold: 999999
temperature: 0.0
system_prompt_version: sweep_D
