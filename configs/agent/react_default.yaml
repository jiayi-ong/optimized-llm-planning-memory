# configs/agent/react_default.yaml
# @package agent
agent:
  mode: compressor             # "raw" | "llm_summary" | "compressor"
  llm_model_id: openai/gpt-4o-mini
  max_steps: 30
  max_retries_per_action: 3
  compress_every_n_steps: 5
  compress_on_token_threshold: 3000
  temperature: 0.0
  system_prompt_version: v2
