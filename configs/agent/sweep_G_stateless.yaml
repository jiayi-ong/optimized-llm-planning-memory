# configs/agent/sweep_G_stateless.yaml
# Prompt sweep variant G — Non-ReAct Commitment-Gated.
# Philosophy: each call must be a booking (A), a committed search (B), or DONE (C); pure exploration forbidden.
# @package agent
mode: stateless
llm_model_id: openai/gpt-4o-mini
max_steps: 20
max_retries_per_action: 3
compress_every_n_steps: 9999
compress_on_token_threshold: 999999
temperature: 0.0
system_prompt_version: sweep_G
