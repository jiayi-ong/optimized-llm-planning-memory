# configs/reward/default.yaml
# @package reward
weights:
  hard_constraint: 2.0
  soft_constraint: 1.0
  tool_efficiency: 0.3
  tool_failure_penalty: -0.5
  logical_consistency: 0.5
  terminal_itinerary: 3.0
terminal_bonus: 5.0
step_penalty: -0.01
normalize: true

# Optional v2 evaluation metrics usable as reward components.
# All disabled by default. Enable in a custom reward config (e.g., coverage_heavy.yaml)
# to add trip-quality signals without modifying reward.py.
# Each component delegates to DeterministicEvaluator v2 logic — training invariant preserved.
optional:
  destination_coverage:
    enabled: false
    weight: 0.1
  activity_density:
    enabled: false
    weight: 0.1
  budget_adherence:
    enabled: false
    weight: 0.2
